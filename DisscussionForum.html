<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discussion Forum</title>
    <script defer src = "http://localhost:3000/socket.io/socket.io.js"></script>
    <script defer src="JS/Client.js"></script>
    <link rel="stylesheet" href="CSS/ForumStyle.css">
</head>
<body>
    <nav style="display: flex; text-align: center; background-color: rgb(212, 211, 211); border-radius: 7px;">
        <img class="ForumIcon" src="ForumIcon.png" alt="">
        <h1 style="text-align: center;margin-top: 1.25%;margin-left: 0%;font-size: 15px;" >Discussion Forum</h1>
    </nav>
    <div class="wrapper" >
        <div class="grouplist"  style="display:flex; text-align: center;">
        <div class="group-container" id="group-container">
           <!-- <Groups will be displayed here -->
            <h3 style="margin-top: 1px;">Communities</h3>
        </div>
    </div>
    <div class="chatsection">
    <div class="container">
        <div class="message-container" id="message-container">
            <!-- Messages will be displayed here -->
        </div>
    </div>

    <div class="send">
    <form action="#" id="send-container">  
        <input type="file" id="fileInput" hidden>
        <button type="button" onclick="document.getElementById('fileInput').click()">
        <img src="More.png" alt="more" class="btn">
        </button>
        <input type="text" name = "messageInput" id="messageInput" placeholder="Type your message here...">
        <button type="Submit" class="sendbutton" >
            <img src="Send.png" class="btn" alt="send">
        </button>
        </form>
    </div>
    </div>
    </div>
    

    
</body>
</html>
